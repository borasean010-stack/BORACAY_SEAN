<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 완료 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8f9fa; color: #333; }
        .complete-container { max-width: 600px; margin: 150px auto; padding: 0 20px; text-align: center; }
        .success-icon { font-size: 80px; color: #ff6a00; margin-bottom: 30px; }
        .complete-card { background: white; padding: 50px 40px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
        h1 { font-size: 32px; font-weight: 900; margin-bottom: 15px; letter-spacing: -1px; }
        p.msg { color: #666; font-size: 17px; line-height: 1.6; margin-bottom: 40px; }
        
        .booking-details { background: #f9f9f9; padding: 25px; border-radius: 20px; text-align: left; margin-bottom: 40px; }
        .detail-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-row span { color: #888; }
        .detail-row b { color: #333; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .kakao-confirm-btn { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 20px; background: #fee500; color: #3c1e1e; 
            border: none; border-radius: 18px; font-size: 18px; font-weight: 800; 
            cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .kakao-confirm-btn:hover { background: #fada00; transform: translateY(-3px); }
        .home-btn { 
            width: 100%; padding: 18px; background: #eee; color: #666; 
            border: none; border-radius: 18px; font-size: 16px; font-weight: 700; 
            cursor: pointer; transition: 0.3s; text-decoration: none;
        }
        .home-btn:hover { background: #e5e5e5; }
        
        .notice-box { margin-top: 30px; font-size: 13px; color: #999; line-height: 1.5; }
    </style>
</head>
<body>

<div class="complete-container">
    <div class="complete-card">
        <div class="success-icon">✅</div>
        <h1>예약이 접수되었습니다!</h1>
        <p class="msg">보라카이션을 선택해 주셔서 감사합니다.<br>빠른 확정을 위해 아래 카카오톡 채널로 메시지를 보내주세요.</p>
        
        <div class="booking-details" id="booking-details">
            <div class="detail-row"><span>예약자명</span><b id="res-name">-</b></div>
            <div class="detail-row"><span>연락처</span><b id="res-contact">-</b></div>
            <div class="detail-row"><span>총 결제금액</span><b id="res-total">₩ 0</b></div>
        </div>

        <div class="btn-group">
            <a href="https://pf.kakao.com/_zBArM" target="_blank" class="kakao-confirm-btn">
                <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png" width="24">
                카카오톡으로 예약 확정받기
            </a>
            <a href="index.html" class="home-btn">홈으로 돌아가기</a>
        </div>

        <div class="notice-box">
            * 상담 시간 외 접수된 예약은 다음날 순차적으로 답변 드립니다.<br>
            * 예약 번호를 함께 말씀해 주시면 더 빠른 상담이 가능합니다.
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const lastBooking = JSON.parse(localStorage.getItem('last_booking_info') || '{}');
        if (lastBooking.customerKorName) {
            document.getElementById('res-name').innerText = lastBooking.customerKorName;
            document.getElementById('res-contact').innerText = lastBooking.contact;
            document.getElementById('res-total').innerText = '₩ ' + (lastBooking.totalPrice || 0).toLocaleString();
        }
    });
</script>

</body>
</html>
