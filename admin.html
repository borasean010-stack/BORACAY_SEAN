<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login Screen -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="login-logo-centered">
                <img src="logo.png" alt="Logo">
                <h1>판매자 센터</h1>
            </div>
            <form id="login-form">
                <div class="input-group"><input type="text" id="username" placeholder="관리자 아이디" required></div>
                <div class="input-group"><input type="password" id="password" placeholder="관리자 비밀번호" required></div>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Admin Layout -->
    <div id="admin-container" class="admin-layout-v3" style="display: none;">
        
        <header class="admin-top-nav">
            <div class="header-left">
                <img src="logo.png" alt="Logo" class="admin-top-logo">
                <span class="brand-text">판매자 센터</span>
            </div>
            <div class="header-right">
                <div class="admin-profile-menu">
                    <span class="material-icons">account_circle</span>
                    <span class="admin-name" id="display-admin-id">Admin</span>
                    <button id="logout-btn" style="background:none; border:none; color:#999; cursor:pointer; font-size:12px; margin-left:10px;">로그아웃</button>
                </div>
            </div>
        </header>

        <div class="admin-content-wrapper">
            <!-- Sidebar -->
            <aside class="admin-side-nav">
                <nav class="side-menu-container">
                    <div class="nav-section">
                        <p class="section-label">대시보드</p>
                        <button class="nav-item active" data-view="reservations">
                            <span class="material-icons">dashboard</span> 전체 현황
                        </button>
                    </div>
                    <div class="nav-section">
                        <p class="section-label">고객 센터</p>
                        <a href="http://pf.kakao.com/_zBArM/chat" target="_blank" class="nav-item" style="text-decoration:none;">
                            <span class="material-icons">chat</span> 카톡 상담연결
                        </a>
                    </div>
                </nav>
            </aside>

            <!-- Main Content Area -->
            <main class="admin-main-content">
                <!-- 탭 레이어 -->
                <div class="admin-tab-layer">
                    <div class="tab-item active" id="tab-new" onclick="switchAdminTab('new')">
                        <span class="t-label">신규 예약 (입금대기)</span>
                        <span class="t-count" id="count-new">0</span>
                    </div>
                    <div class="tab-item" id="tab-confirmed" onclick="switchAdminTab('confirmed')">
                        <span class="t-label">예약 확정</span>
                        <span class="t-count" id="count-confirmed">0</span>
                    </div>
                    <div class="tab-item" id="tab-resorts" onclick="switchAdminTab('resorts')">
                        <span class="t-label">리조트 견적</span>
                        <span class="t-count" id="count-resorts">0</span>
                    </div>
                </div>

                <div class="view-header">
                    <h2 id="current-view-title">신규 예약 목록</h2>
                    <div class="header-tools">
                        <input type="text" id="header-global-search" placeholder="예약번호/이름 검색" style="padding:6px 12px; border:1px solid #ddd; border-radius:4px; font-size:12px;">
                    </div>
                </div>

                <div class="content-card">
                    <table class="admin-data-table">
                        <thead>
                            <tr>
                                <th width="40"><input type="checkbox" id="check-all"></th>
                                <th>번호</th>
                                <th>예약번호</th>
                                <th>고객명</th>
                                <th>상품정보</th>
                                <th>신청금액</th>
                                <th>예약일</th>
                                <th style="text-align:center;">상태</th>
                                <th width="160">액션</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- JS Render -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>예약 상세 정보</h3>
                <button onclick="closeModal()" style="border:none; background:none; cursor:pointer;"><span class="material-icons">close</span></button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-action-outline" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
