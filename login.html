<script>
    // 제공해주신 자바스크립트 키 적용
    const KAKAO_KEY = '9e8b2d2be22f60f1cc512d61d6ba6991';
    // Cloudflare Pages 도메인에 맞춘 Redirect URI (반드시 카카오 설정과 일치해야 함)
    const REDIRECT_URI = 'https://boracay-sean.pages.dev/login.html';

    if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

    function loginWithKakao() {
        Kakao.Auth.authorize({
            redirectUri: REDIRECT_URI
        });
    }

    // 카카오로부터 인가 코드를 가지고 돌아왔을 때 처리
    window.onload = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            console.log("인가 코드 확인됨:", code);
            // 프론트엔드 프로토타입 구현을 위해 임시 유저 정보를 생성합니다.
            // (실제 서비스에서는 이 코드를 서버로 보내 access_token으로 교환해야 합니다.)
            const tempUser = { 
                nickname: "보라카이션 손님", 
                id: "kakao_" + Math.floor(Math.random() * 1000000) 
            };
            localStorage.setItem('kakao_user', JSON.stringify(tempUser));
            
            // 로그인 전 하던 작업이 있다면 해당 페이지로, 아니면 홈으로
            const directBuy = sessionStorage.getItem('directBuyItem');
            setTimeout(() => {
                location.href = directBuy ? 'booking-form.html' : 'index.html';
            }, 500);
        }
    };
</script>
