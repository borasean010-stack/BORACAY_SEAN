<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예약 데이터 초기화 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
        .card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
        h1 { color: #ff6a00; margin-bottom: 20px; }
        #status { font-size: 18px; color: #333; line-height: 1.6; }
        .btn-home { display: inline-block; margin-top: 30px; padding: 12px 25px; background: #111; color: white; text-decoration: none; border-radius: 12px; font-weight: 800; }
    </style>
</head>
<body>
    <div class="card">
        <h1>데이터 초기화</h1>
        <div id="status">데이터를 삭제하고 있습니다...</div>
        <a href="admin.html" class="btn-home">관리자 페이지로</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDkDjmGKQDF-0Vu2S_qtI6W5Hf2-j4tKcM",
            authDomain: "boracaysean-69b4a.firebaseapp.com",
            projectId: "boracaysean-69b4a",
            storageBucket: "boracaysean-69b4a.firebasestorage.app",
            messagingSenderId: "806585874771",
            appId: "1:806585874771:web:64a094d241730ca38109a6"
        };

        async function startDeletion() {
            const statusEl = document.getElementById('status');
            try {
                const app = initializeApp(firebaseConfig);
                const db = getFirestore(app);
                const colRef = collection(db, "reservations");
                const snapshot = await getDocs(colRef);
                
                if (snapshot.empty) {
                    statusEl.innerText = "삭제할 예약 데이터가 없습니다.";
                    return;
                }

                let count = 0;
                const deletePromises = snapshot.docs.map((d) => {
                    count++;
                    return deleteDoc(doc(db, "reservations", d.id));
                });
                
                await Promise.all(deletePromises);
                statusEl.innerHTML = `총 <b>${count}</b>개의 테스트 데이터를<br>성공적으로 삭제했습니다.`;
            } catch (e) {
                statusEl.innerText = "에러 발생: " + e.message;
                console.error(e);
            }
        }

        startDeletion();
    </script>
</body>
</html>
