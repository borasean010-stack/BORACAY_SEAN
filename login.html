<script>
    function loginWithKakao() {
        if (!Kakao.isInitialized()) {
            Kakao.init('7610f11ad9a9851159dec6168f83099b');
        }

        Kakao.Auth.login({
            success: function(authObj) {
                console.log("Login Success:", authObj);
                Kakao.API.request({
                    url: '/v2/user/me',
                    success: function(res) {
                        console.log("User Info:", res);
                        const user = {
                            id: res.id,
                            nickname: res.kakao_account.profile.nickname,
                            profile_image: res.kakao_account.profile.thumbnail_image_url
                        };
                        localStorage.setItem('kakao_user', JSON.stringify(user));
                        
                        // 예약 정보가 있으면 예약 폼으로, 없으면 홈으로
                        const directBuy = sessionStorage.getItem('directBuyItem');
                        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
                        
                        if (directBuy || cart.length > 0) {
                            location.href = 'booking-form.html';
                        } else {
                            location.href = 'index.html';
                        }
                    },
                    fail: function(error) {
                        console.error(error);
                        alert('사용자 정보를 가져오는데 실패했습니다.');
                    }
                });
            },
            fail: function(err) {
                console.error(err);
                alert('카카오 로그인에 실패했습니다.');
            }
        });
    }
</script>
