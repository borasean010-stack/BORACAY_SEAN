<script>
    document.addEventListener('DOMContentLoaded', function() {
        const container = document.getElementById('booking-list-container');
        const lastBooking = JSON.parse(localStorage.getItem('last_booking_info'));
        const completedBookings = JSON.parse(localStorage.getItem('completed_bookings') || '[]');

        if (!lastBooking && completedBookings.length === 0) {
            container.innerHTML = `
                <div style="text-align:center; padding:100px 0; background:white; border-radius:24px; border:1px dashed #ddd;">
                    <p style="color:#888; margin-bottom:20px; font-size:17px;">아직 예약된 내역이 없습니다.</p>
                    <a href="index.html" style="color:#ff6a00; font-weight:800; text-decoration:none;">투어 보러가기 →</a>
                </div>
            `;
            return;
        }

        container.innerHTML = '';

        // 만약 completed_bookings가 없고 last_booking_info만 있다면 (구버전 호환 또는 현재 진행중인 예약)
        // 하지만 제대로 된 마이페이지라면 completed_bookings를 순회해야 함.
        
        const allBookings = [...completedBookings];
        // 만약 방금 예약을 마쳤는데 아직 completed_bookings에 안 들어갔다면 (테스트용)
        // 실제로는 booking-complete.html에서 넣어주는 로직을 추가할 것임.

        if (allBookings.length === 0 && lastBooking) {
            // 임시로 lastBooking이라도 보여줌
            renderBooking(container, { info: lastBooking, items: [] }, 0);
        } else {
            allBookings.reverse().forEach((booking, index) => {
                renderBooking(container, booking, index);
            });
        }
    });

    function renderBooking(container, booking, index) {
        const info = booking.info;
        const items = booking.items || [];
        const date = booking.timestamp ? new Date(booking.timestamp).toLocaleDateString() : '최근 예약';

        const card = document.createElement('div');
        card.className = 'booking-card';
        
        let itemsHtml = '';
        let totalPrice = 0;
        
        items.forEach(item => {
            const price = item.price * item.count;
            totalPrice += price;
            itemsHtml += `
                <div class="reserved-item">
                    <div>
                        <div class="item-title">${item.name}</div>
                        <div class="item-meta">예약일: ${item.date} | 인원: ${item.count}명</div>
                    </div>
                    <div class="item-price">₩ ${price.toLocaleString()}</div>
                </div>
            `;
        });

        card.innerHTML = `
            <h3><span>●</span> 예약 내역 (${date})</h3>
            <div class="info-grid">
                <div class="info-item">
                    <label>대표자명</label>
                    <span>${info.customerKorName}</span>
                </div>
                <div class="info-item">
                    <label>연락처/카톡ID</label>
                    <span>${info.contact}</span>
                </div>
                ${info.engName ? `
                <div class="info-item">
                    <label>영문성함</label>
                    <span>${info.engName}</span>
                </div>` : ''}
                ${info.pickupFlight ? `
                <div class="info-item">
                    <label>항공편 (픽업/샌딩)</label>
                    <span>${info.pickupFlight} / ${info.sendingFlight}</span>
                </div>` : ''}
            </div>
            <div class="reserved-items-list">
                <label style="display:block; font-size:14px; color:#888; margin-bottom:15px; font-weight:600;">예약 상품</label>
                ${itemsHtml || '<p style="color:#ccc;">상품 정보 없음</p>'}
            </div>
            ${totalPrice > 0 ? `
            <div style="margin-top:30px; padding-top:20px; border-top:1px solid #f5f5f5; text-align:right;">
                <span style="color:#888; font-size:14px; margin-right:15px;">총 결제 금액</span>
                <span style="font-size:24px; font-weight:900; color:#ff6a00;">₩ ${totalPrice.toLocaleString()}</span>
            </div>` : ''}
        `;
        
        container.appendChild(card);
    }
</script>
