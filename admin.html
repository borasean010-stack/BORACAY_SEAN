<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Login Screen -->
    <div id="login-container" class="login-wrapper">
        <div class="login-box">
            <div class="login-logo"><img src="logo.png" alt="Logo"><h2>판매자 센터</h2></div>
            <form id="login-form">
                <div class="input-row"><input type="text" id="username" placeholder="관리자 아이디" required></div>
                <div class="input-row"><input type="password" id="password" placeholder="관리자 비밀번호" required></div>
                <button type="submit" class="btn-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Admin Layout -->
    <div id="admin-container" class="admin-layout" style="display: none;">
        <!-- Top Navigation Area -->
        <header class="admin-header">
            <div class="header-top">
                <div class="logo-area"><img src="logo.png" alt="Logo"> <span>관리자 센터</span></div>
                <nav class="main-nav">
                    <button class="nav-btn active" data-mode="sales">판매 관리</button>
                    <button class="nav-btn" data-mode="settlement">정산 관리</button>
                </nav>
                <div class="user-area"><button id="logout-btn">로그아웃</button></div>
            </div>

            <!-- Sub Navigation (Sales Management) -->
            <div id="sales-sub-nav" class="sub-nav-wrapper">
                <div class="sub-nav">
                    <div class="tab-item active" data-tab="신규">
                        <span class="label">신규 주문</span>
                        <span class="count" id="cnt-new">0</span>
                    </div>
                    <div class="status-arrow"><span class="material-icons">east</span></div>
                    <div class="tab-item" data-tab="예약완료">
                        <span class="label">예약 완료</span>
                        <span class="count" id="cnt-completed">0</span>
                    </div>
                    <div class="status-arrow"><span class="material-icons">east</span></div>
                    <div class="tab-item" data-tab="확정">
                        <span class="label">구매 확정</span>
                        <span class="count" id="cnt-confirmed">0</span>
                    </div>
                </div>
            </div>

            <!-- Settlement Info (Hidden by default) -->
            <div id="settlement-info-bar" class="settlement-bar" style="display: none;">
                <div class="settle-card">
                    <span class="label">이번 달 정산 예정 금액</span>
                    <span class="value" id="settle-amount">₩ 0</span>
                </div>
                <div class="settle-card">
                    <span class="label">다음 정산 예정일 (PG)</span>
                    <span class="value" id="settle-date">2024-03-15</span>
                </div>
            </div>
        </header>

        <!-- Main Content (Table) -->
        <main class="admin-main">
            <section class="content-panel table-section">
                <div class="panel-header">
                    <h3 id="view-title">신규 주문 내역</h3>
                    <div class="search-area">
                        <input type="text" id="res-search" placeholder="예약자명 검색...">
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>예약번호</th>
                                <th>이용일자</th>
                                <th>예약자</th>
                                <th>상품명</th>
                                <th>금액</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body"></tbody>
                    </table>
                </div>
            </section>

            <!-- Bottom Section (Schedule & Alerts) -->
            <section class="bottom-grid">
                <!-- Daily Schedule -->
                <div class="content-panel schedule-panel">
                    <div class="panel-header"><h3>📅 당일 예약 스케줄</h3></div>
                    <div id="today-schedule-list" class="schedule-list">
                        <!-- JS Render -->
                    </div>
                </div>

                <!-- New Order Alert -->
                <div class="content-panel alert-panel">
                    <div class="panel-header"><h3>📢 실시간 알림</h3></div>
                    <div id="new-order-alert" class="new-order-notice" style="display: none;">
                        <span class="material-icons">notifications_active</span>
                        <p>새로운 주문 <b id="alert-cnt">0</b>건이 들어왔습니다!</p>
                        <button onclick="goToNewOrders()">확인하기</button>
                    </div>
                    <p id="no-alert-msg" class="empty-msg">새로운 알림이 없습니다.</p>
                </div>
            </section>
        </main>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
