<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login Screen -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="ambient-bg-admin"></div>
        <div class="admin-login-card">
            <div class="login-logo-centered">
                <img src="logo.png" alt="Logo">
                <h1>SELLER CENTER</h1>
            </div>
            <form id="login-form">
                <div class="input-group"><input type="text" id="username" placeholder="관리자 아이디" required></div>
                <div class="input-group"><input type="password" id="password" placeholder="관리자 비밀번호" required></div>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Admin Layout (V3 Overhaul) -->
    <div id="admin-container" class="admin-layout-v3" style="display: none;">
        
        <!-- 1. Top Bar -->
        <header class="admin-top-nav">
            <div class="header-left">
                <div class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></div>
                <img src="logo.png" alt="Logo" class="admin-top-logo">
                <span class="brand-text">SELLER CENTER</span>
            </div>
            <div class="header-center">
                <div class="global-search-container">
                    <span class="material-icons">search</span>
                    <input type="text" id="header-global-search" placeholder="예약번호 또는 고객명으로 검색">
                </div>
            </div>
            <div class="header-right">
                <div class="header-icon-btn">
                    <span class="material-icons">notifications</span>
                    <span class="badge-n" id="new-res-count">0</span>
                </div>
                <div class="header-icon-btn pc-only">
                    <span class="material-icons">apps</span>
                </div>
                <div class="admin-profile-menu">
                    <span class="material-icons">account_circle</span>
                    <span class="admin-name" id="display-admin-id">Admin</span>
                    <span class="material-icons">expand_more</span>
                </div>
            </div>
        </header>

        <div class="admin-content-wrapper">
            <!-- 2. Left Sidebar Navigation -->
            <aside class="admin-side-nav" id="sideMenu">
                <nav class="side-menu-container">
                    <div class="nav-section">
                        <p class="section-label">운영 관리</p>
                        <button class="nav-item active" data-view="reservations">
                            <span class="material-icons">assignment</span> 예약 관리
                        </button>
                        <button class="nav-item" data-view="tours">
                            <span class="material-icons">explore</span> 투어/액티비티
                        </button>
                        <button class="nav-item" data-view="resorts">
                            <span class="material-icons">hotel</span> 리조트
                        </button>
                        <button class="nav-item" data-view="payments">
                            <span class="material-icons">payments</span> 장바구니/결제 확인
                        </button>
                        <button class="nav-item" data-view="customers">
                            <span class="material-icons">people</span> 고객 관리
                        </button>
                    </div>

                    <div class="nav-section filter-section">
                        <p class="section-label">상세 필터</p>
                        <div class="filter-group">
                            <label>날짜별 보기</label>
                            <input type="date" id="side-date-filter">
                        </div>
                        <div class="filter-group">
                            <label>상태별 보기</label>
                            <select id="side-status-filter">
                                <option value="all">전체 상태</option>
                                <option value="예약접수">예약접수</option>
                                <option value="입금대기">입금대기</option>
                                <option value="예약확정">예약확정</option>
                                <option value="견적">견적신청</option>
                                <option value="취소">취소됨</option>
                            </select>
                        </div>
                    </div>

                    <div class="side-footer">
                        <button class="side-footer-btn" onclick="location.reload()"><span class="material-icons">refresh</span></button>
                        <button class="side-footer-btn logout-trigger" id="logout-btn"><span class="material-icons">logout</span> 로그아웃</button>
                    </div>
                </nav>
            </aside>

            <!-- 3. Central Content Area -->
            <main class="admin-main-content">
                <div class="view-header">
                    <h2 id="current-view-title">예약 관리</h2>
                    <div class="view-actions" id="bulk-actions" style="display:none;">
                        <span class="selected-count">0개 선택됨</span>
                        <button class="btn-bulk-confirm" onclick="bulkConfirmDeposit()">선택 입금확정</button>
                        <button class="btn-bulk-delete" onclick="bulkCancel()">선택 취소</button>
                    </div>
                </div>

                <!-- Unified Content Container -->
                <div id="content-render-area" class="content-card">
                    <div class="table-responsive">
                        <table class="admin-data-table">
                            <thead>
                                <tr>
                                    <th width="40"><input type="checkbox" id="check-all"></th>
                                    <th>예약번호</th>
                                    <th>고객명</th>
                                    <th>상품정보</th>
                                    <th>예약일</th>
                                    <th>상태</th>
                                    <th width="200">액션</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                <!-- JS Rendered Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Reservation Detail Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>예약 상세 정보</h3>
                <button class="close-modal" onclick="closeModal()"><span class="material-icons">close</span></button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- JS Render -->
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="closeModal()">닫기</button>
            </div>
        </div>
    </div>

    <div class="side-menu-overlay" id="overlay"></div>

    <script type="module" src="admin.js"></script>
</body>
</html>
