<script src="main.js"></script>
<script>
    let adultCount = 1;
    const pricePerPerson = 65000;
    let selectedDate = '2026-03-02';
    function openOptionSheet() { document.getElementById('sheetOverlay').style.display = 'block'; document.getElementById('optionSheet').classList.add('active'); }
    function closeOptionSheet() { document.getElementById('sheetOverlay').style.display = 'none'; document.getElementById('optionSheet').classList.remove('active'); }
    function updateCount(delta) {
        adultCount = Math.max(1, adultCount + delta);
        document.getElementById('adult-count').innerText = adultCount;
    }
    function addToCart() {
        const item = { name: "블랙펄 요트 호핑투어", price: pricePerPerson, count: adultCount, date: selectedDate };
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart.push(item);
        localStorage.setItem('cart', JSON.stringify(cart));
        if(confirm('장바구니에 담겼습니다.')) { location.href = 'cart.html'; }
    }
    function renderCalendar(id) {
        const container = document.getElementById(id);
        container.innerHTML = '';
        ['일','월','화','수','목','금','토'].forEach(d => container.innerHTML += `<div style="color:#bbb; font-weight:800;">${d}</div>`);
        for(let i=1; i<=31; i++) {
            const div = document.createElement('div');
            div.className = 'day' + (i===2 ? ' selected' : '');
            div.innerText = i;
            div.onclick = function() {
                document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                this.classList.add('selected');
            };
            container.appendChild(div);
        }
    }
    window.onload = () => { renderCalendar('pc-calendar-days'); renderCalendar('m-calendar-days'); };
</script>
