<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | BORACAY SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-l68G9m6HS8uR7C/5L94K8N08O0t8TzU+A0fS2x5W5F9z7Vz0O+6x1H6Z8M2N5R1" crossorigin="anonymous"></script>
    <style>
        :root {
            --lux-gold: #c5a059;
            --lux-dark: #1a1a1a;
            --lux-light: #fdfdfd;
            --accent-color: #ff6a00;
        }

        body.lux-login-bg {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
        }

        /* Ambient Background Effect */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('beach1.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(40px) brightness(0.4);
            z-index: -1;
            transform: scale(1.1);
        }

        .login-card {
            width: 90%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo-centered {
            margin-bottom: 35px;
            display: block;
            text-decoration: none;
        }

        .login-logo-centered img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
            margin-bottom: 15px;
        }

        .login-logo-centered h1 {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .login-welcome {
            margin-bottom: 35px;
        }

        .login-welcome h2 {
            color: var(--lux-gold);
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-welcome p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.6;
            margin: 0;
        }

        /* 폼 섹션 스타일 */
        .admin-login-form {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group {
            position: relative;
            text-align: left;
        }

        .input-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 18px 20px;
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--lux-gold);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2);
        }

        .btn-login {
            width: 100%;
            background: var(--lux-gold);
            color: #fff;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #d4b47a;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            gap: 15px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .kakao-login-btn {
            width: 100%;
            border: none;
            background: #fee500;
            color: #3c1e1e;
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .kakao-login-btn:hover {
            transform: translateY(-2px);
            background: #fada00;
        }

        .kakao-login-btn img {
            width: 20px;
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .home-link:hover {
            color: #fff;
        }

        /* Footer in Login */
        .login-footer {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            text-align: center;
            width: 100%;
        }

        @media (max-device-width: 480px) {
            .login-card {
                padding: 40px 25px;
            }
        }
    </style>
</head>
<body class="lux-login-bg">
<div class="side-menu-overlay" id="overlay"></div>
<div class="side-menu" id="sideMenu">
    <div class="side-menu-header">
        <div class="side-logo">BORACAY SEAN</div>
        <div class="side-close" id="sideClose">✕</div>

        <a href="mypage.html" style="margin-top:20px; font-size:14px; opacity:0.6;">마이페이지 (예약확인)</a>
    </div>
</div>

<div class="top-bar">
    <div class="header-left">
        <div class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></div>
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" class="logo-img" alt="로고"><span class="logo-text">BORACAY SEAN</span></a>
        </div>
    </div>

    <div class="menu pc-only">
        <a href="essential-tours.html" class="tab-link" data-category="essential">보라카이 필수투어</a>
        <a href="activities.html" class="tab-link" data-category="activity">액티비티</a>
        <a href="massage.html" class="tab-link" data-category="massage">마사지</a>
        <a href="price-list.html" class="tab-link">한눈에 요금표</a>
        <a href="resort-quote.html" class="tab-link">리조트 견적</a>
        <a href="cart.html" class="tab-link">장바구니</a>
    </div>

    <div class="header-right">
        <!-- main.js에서 동적으로 버튼들이 삽입됩니다 -->
    </div>
</div>
<div class="login-card">
        <a href="index.html" class="login-logo-centered">
            <img src="logo.png" alt="Boracay Sean Logo">
            <h1>BORACAY SEAN</h1>
        </a>

        <div class="login-welcome">
            <h2>Luxury Experience</h2>
            <p>보라카이션의 특별한 서비스와<br>체계적인 관리 시스템을 경험하세요.</p>
        </div>

        <form class="admin-login-form" onsubmit="handleAdminLogin(event)">
            <div class="input-group">
                <input type="text" id="adminId" placeholder="아이디를 입력하세요" required>
            </div>
            <div class="input-group">
                <input type="password" id="adminPw" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn-login">관리자 로그인</button>
        </form>

        <div class="divider">또는</div>

        <button onclick="loginWithKakao()" class="kakao-login-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="Kakao">
            카카오 1초 로그인
        </button>

        <a href="index.html" class="home-link">홈으로 돌아가기</a>
    </div>

    <div class="login-footer">
        © 2024 BORACAY SEAN. All Rights Reserved.
    </div>

    <script>
        const KAKAO_KEY = '9e8b2d2be22f60f1cc512d61d6ba6991';
        const REDIRECT_URI = 'https://boracay-sean.pages.dev/login.html';

        if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

        function loginWithKakao() {
            Kakao.Auth.authorize({
                redirectUri: REDIRECT_URI
            });
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const id = document.getElementById('adminId').value;
            const pw = document.getElementById('adminPw').value;

            // 실제 운영시에는 Firebase Auth 등을 사용해야 함
            if(id === 'admin' && pw === 'sean1234') {
                localStorage.setItem('isAdmin', 'true');
                alert('관리자로 로그인되었습니다.');
                location.href = 'admin.html';
            } else {
                alert('아이디 또는 비밀번호가 일치하지 않습니다.');
            }
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                const tempUser = { 
                    nickname: "보라카이션 손님", 
                    id: "kakao_" + Math.floor(Math.random() * 1000000) 
                };
                localStorage.setItem('kakao_user', JSON.stringify(tempUser));
                
                const directBuy = sessionStorage.getItem('directBuyItem');
                setTimeout(() => {
                    location.href = directBuy ? 'booking-form.html' : 'index.html';
                }, 500);
            }
        };
    </script>
</body>
</html>
