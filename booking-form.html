<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 정보 입력 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8f9fa; color: #333; }
        .booking-container { max-width: 800px; margin: 100px auto 100px; padding: 0 20px; }
        
        /* 📦 주문 요약 카드 */
        .order-summary-card { background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; margin-bottom: 30px; }
        .order-summary-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #ff6a00; display: flex; align-items: center; gap: 8px; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
        .order-item:last-child { border-bottom: none; }
        .order-item b { color: #ff6a00; }

        /* 📝 정보 입력 카드 */
        .form-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .form-card h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .form-card p.desc { color: #888; margin-bottom: 35px; font-size: 15px; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 15px; font-weight: 700; color: #444; margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 16px; border: 1.5px solid #eee; border-radius: 14px; font-family: inherit; font-size: 16px; transition: 0.3s; background: #fafafa; }
        .input-group input:focus { outline: none; border-color: #ff6a00; background: white; box-shadow: 0 0 0 4px rgba(255,106,0,0.1); }
        
        .section-divider { height: 1px; background: #f0f0f0; margin: 35px 0; position: relative; }
        .section-divider span { position: absolute; left: 0; top: -10px; background: white; padding-right: 15px; font-size: 14px; font-weight: 800; color: #bbb; text-transform: uppercase; }
        
        .section-subtitle { font-size: 19px; font-weight: 800; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .next-btn { width: 100%; padding: 22px; background: #ff6a00; color: white; border: none; border-radius: 18px; font-size: 19px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 10px 25px rgba(255,106,0,0.25); }
        .next-btn:hover { background: #e65f00; transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255,106,0,0.3); }

        #pickup-sending-fields { display: none; background: #fffcf9; padding: 25px; border-radius: 20px; border: 1px solid #fff1e6; margin-top: 10px; }
        .required-mark { color: #ff6a00; margin-left: 4px; }

        @media (max-width: 600px) {
            .form-card { padding: 30px 20px; }
            .booking-container { margin-top: 80px; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="header-left">
        <div class="logo">
            <a href="index.html">
                <img src="logo.png" class="logo-img" alt="로고">
                BORACAY_SEAN
            </a>
        </div>
    </div>
</div>

<div class="booking-container">
    
    <!-- 🛒 주문 요약 섹션 -->
    <div class="order-summary-card" id="order-summary">
        <h3><span style="font-size:24px;">🛒</span> 선택하신 상품 확인</h3>
        <div id="summary-list">
            <!-- 자바스크립트로 렌더링 -->
        </div>
    </div>

    <div class="form-card">
        <h2>예약 정보 입력</h2>
        <p class="desc">정확한 정보를 입력해 주셔야 차질 없는 진행이 가능합니다.</p>
        
        <form id="booking-form" onsubmit="handleFormSubmit(event)">
            <!-- 👤 기본 정보 -->
            <div class="section-subtitle">👤 대표자 기본 정보</div>
            <div class="input-group">
                <label>대표자 성함 (한글)<span class="required-mark">*</span></label>
                <input type="text" id="kor-name" placeholder="예: 홍길동" required>
            </div>
            <div class="input-group">
                <label>카카오톡 ID 또는 연락처<span class="required-mark">*</span></label>
                <input type="text" id="contact" placeholder="안내 메시지를 받으실 수 있는 정보" required>
            </div>

            <!-- ✈️ 픽업/샌딩 전용 정보 (장바구니 확인 후 표시) -->
            <div id="pickup-sending-fields">
                <div class="section-subtitle" style="color:#ff6a00;">✈️ 픽업/샌딩 상세 정보</div>
                <p style="font-size:13px; color:#888; margin-bottom:20px;">공항 이동 서비스를 위해 반드시 필요한 정보입니다.</p>
                
                <div class="input-group">
                    <label>대표자 영문 이름<span class="required-mark">*</span></label>
                    <input type="text" id="eng-name" placeholder="여권과 동일한 영문 성함 (예: HONG GILDONG)">
                </div>

                <div class="section-divider"><span>입국 시 정보 (픽업)</span></div>
                <div class="input-group">
                    <label>픽업 항공편명<span class="required-mark">*</span></label>
                    <input type="text" id="pickup-flight" placeholder="예: 7C2301">
                </div>
                <div class="input-group">
                    <label>픽업 호텔 (첫날 호텔)<span class="required-mark">*</span></label>
                    <input type="text" id="pickup-resort" placeholder="보라카이 도착 후 투숙하시는 리조트명">
                </div>

                <div class="section-divider"><span>출국 시 정보 (샌딩)</span></div>
                <div class="input-group">
                    <label>샌딩 항공편명<span class="required-mark">*</span></label>
                    <input type="text" id="sending-flight" placeholder="예: 7C2302">
                </div>
                <div class="input-group">
                    <label>샌딩 호텔 (마지막날 호텔)<span class="required-mark">*</span></label>
                    <input type="text" id="sending-resort" placeholder="보라카이에서 체크아웃 하시는 리조트명">
                </div>
            </div>

            <button type="submit" class="next-btn">예약 완료 및 결제하기</button>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="footer-left">
        <b>상호 : 보라카이션 | 대표 : 윤오현</b><br>
        서울특별시 중랑구 상봉로 16길 25-3<br>
        사업자번호 : 498-31-00593 | daemit@naver.com
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        let cart = [];
        const directBuy = sessionStorage.getItem('directBuyItem');
        
        if (directBuy) {
            cart = [JSON.parse(directBuy)];
        } else {
            cart = JSON.parse(localStorage.getItem('cart') || '[]');
        }

        const summaryList = document.getElementById('summary-list');
        
        if (cart.length === 0) {
            alert('결제할 상품이 없습니다. 상품을 먼저 선택해주세요.');
            location.href = 'index.html';
            return;
        }

        // 📋 주문 요약 렌더링
        let hasPickup = false;
        cart.forEach(item => {
            if (item.name.includes('픽업샌딩')) hasPickup = true;
            
            const div = document.createElement('div');
            div.className = 'order-item';
            div.innerHTML = `
                <span>${item.name} (${item.count}명)</span>
                <b>₩ ${ (item.price * item.count).toLocaleString() }</b>
            `;
            summaryList.appendChild(div);
        });

        // ✈️ 픽업샌딩 필드 제어
        if (hasPickup) {
            const fields = document.getElementById('pickup-sending-fields');
            fields.style.display = 'block';
            
            // 필수 속성 강제 부여
            const inputs = fields.querySelectorAll('input');
            inputs.forEach(input => input.required = true);
        }
    });

    function handleFormSubmit(e) {
        e.preventDefault();
        
        const bookingData = {
            customerKorName: document.getElementById('kor-name').value,
            contact: document.getElementById('contact').value,
            // 픽업샌딩 정보 (없을 경우 빈 문자열)
            engName: document.getElementById('eng-name').value || '',
            pickupFlight: document.getElementById('pickup-flight').value || '',
            pickupResort: document.getElementById('pickup-resort').value || '',
            sendingFlight: document.getElementById('sending-flight').value || '',
            sendingResort: document.getElementById('sending-resort').value || ''
        };
        
        localStorage.setItem('last_booking_info', JSON.stringify(bookingData));
        
        // 버튼 로딩 효과 시뮬레이션
        const btn = e.target.querySelector('button');
        btn.innerText = '예약 정보 확인 중...';
        btn.disabled = true;

        setTimeout(() => {
            location.href = 'booking-complete.html';
        }, 800);
    }
</script>
</body>
</html>
