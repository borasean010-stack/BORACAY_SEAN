<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <h1>판매자 센터 로그인</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="admin-container" class="admin-layout-v3" style="display: none;">
        <!-- 1. Header -->
        <header class="admin-top-nav">
            <div class="header-left">
                <img src="logo.png" alt="Logo" class="admin-top-logo">
                <span class="brand-text">판매자 센터</span>
            </div>
            <div class="header-right">
                <div class="admin-user-info">
                    <span class="material-icons">account_circle</span>
                    <span id="display-admin-id">Admin</span>
                    <button id="logout-btn">로그아웃</button>
                </div>
            </div>
        </header>

        <div class="admin-content-wrapper">
            <!-- 2. Sidebar (Sub Menu) -->
            <aside class="admin-side-nav">
                <div class="nav-section">
                    <p class="section-label">주문/배송 관리</p>
                    <button class="nav-item active" onclick="location.reload()">
                        <span class="material-icons">list_alt</span> 예약 현황 메인
                    </button>
                </div>
                <div class="nav-section">
                    <p class="section-label">고객 관리</p>
                    <a href="http://pf.kakao.com/_zBArM/chat" target="_blank" class="nav-item" style="text-decoration:none;">
                        <span class="material-icons">chat</span> 카톡 상담연결
                    </a>
                </div>
            </aside>

            <!-- 3. Main Content -->
            <main class="admin-main-content">
                <!-- Top Layer Tabs -->
                <div class="admin-main-tabs">
                    <div class="tab-item active" id="tab-new" onclick="switchAdminTab('new')">
                        <div class="t-inner">
                            <span class="t-label">신규 예약 (입금대기)</span>
                            <span class="t-count" id="count-new">0</span>
                        </div>
                    </div>
                    <div class="tab-item" id="tab-confirmed" onclick="switchAdminTab('confirmed')">
                        <div class="t-inner">
                            <span class="t-label">예약 확정</span>
                            <span class="t-count" id="count-confirmed">0</span>
                        </div>
                    </div>
                    <div class="tab-item" id="tab-resorts" onclick="switchAdminTab('resorts')">
                        <div class="t-inner">
                            <span class="t-label">리조트 견적</span>
                            <span class="t-count" id="count-resorts">0</span>
                        </div>
                    </div>
                </div>

                <!-- Table Header Tools -->
                <div class="view-header">
                    <h2 id="current-view-title">신규 예약 목록</h2>
                    <div class="table-tools">
                        <input type="text" id="header-global-search" placeholder="고객명 또는 예약번호 검색">
                    </div>
                </div>

                <!-- Data Table -->
                <div class="content-card">
                    <div class="table-container">
                        <table class="admin-data-table">
                            <thead>
                                <tr>
                                    <th width="40"><input type="checkbox" id="check-all"></th>
                                    <th width="50">번호</th>
                                    <th width="100">예약번호</th>
                                    <th width="100">고객명</th>
                                    <th>상품 정보</th>
                                    <th width="110">결제금액</th>
                                    <th width="100">신청일</th>
                                    <th width="90" style="text-align:center;">상태</th>
                                    <th width="160">관리</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                <!-- JS Dynamic Render -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>예약 상세 내역</h3>
                <button onclick="closeModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-action-outline" onclick="closeModal()">확인</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
