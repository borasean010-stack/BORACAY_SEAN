<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 신청 완료 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #fdfdfd; }
        .complete-container { 
            max-width: 600px; 
            margin: 120px auto 100px; 
            padding: 0 20px; 
            text-align: center; 
        }
        .success-card { 
            background: white; 
            padding: 60px 40px; 
            border-radius: 35px; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.06); 
            border: 1px solid #f5f5f5;
        }
        
        .kakao-channel-info {
            background: #fff9e6;
            border-radius: 25px;
            padding: 30px;
            margin-bottom: 35px;
            border: 1px solid #ffeeba;
        }
        .channel-logo {
            width: 80px;
            height: 80px;
            background: #fee500;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 20px rgba(254,229,0,0.3);
        }
        .channel-logo img { width: 50px; }
        
        h2 { font-size: 30px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; color: #111; }
        .sub-text { color: #666; font-size: 16px; margin-bottom: 30px; line-height: 1.6; }

        .btn-confirm {
            background: #fee500;
            color: #3c1e1e;
            padding: 22px;
            border-radius: 20px;
            font-weight: 900;
            text-decoration: none;
            font-size: 19px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px rgba(254,229,0,0.4);
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .btn-confirm:hover { background: #fada00; transform: translateY(-5px); box-shadow: 0 15px 40px rgba(254,229,0,0.5); }
        
        .btn-home {
            display: inline-block;
            margin-top: 25px;
            color: #999;
            text-decoration: none;
            font-weight: 700;
            font-size: 15px;
        }
        .btn-home:hover { color: #ff6a00; }

        .booking-summary {
            text-align: left;
            background: #fafafa;
            padding: 20px;
            border-radius: 18px;
            margin-top: 30px;
            font-size: 14px;
        }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .summary-row:last-child { margin-bottom: 0; }
        .summary-label { color: #888; }
        .summary-value { font-weight: 800; color: #333; }
    </style>
</head>
<body>

<div class="complete-container">
    <div class="success-card">
        <div class="kakao-channel-info">
            <div class="channel-logo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="Kakao">
            </div>
            <h2>보라카이션 카카오 채널</h2>
            <p style="font-weight: 700; color: #856404; margin-top: 5px;">마지막 단계: 예약 확정 받기</p>
        </div>

        <h2>예약 신청이 완료되었습니다!</h2>
        <p class="sub-text">
            아래 버튼을 눌러 보라카이션 카카오톡 채널로<br>
            <b>"예약 확정"</b> 메시지를 보내주시면 즉시 처리를 도와드립니다.
        </p>

        <a href="https://business.kakao.com/_zBArM/chats" target="_blank" class="btn-confirm">
            상품 예약 확정받기 ➔
        </a>

        <div class="booking-summary" id="booking-summary">
            <div class="summary-row"><span class="summary-label">예약자명</span><span class="summary-value" id="s-name">-</span></div>
            <div class="summary-row"><span class="summary-label">결제수단</span><span class="summary-value" id="s-payment">-</span></div>
        </div>

        <a href="index.html" class="btn-home">홈으로 돌아가기</a>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const lastInfo = JSON.parse(localStorage.getItem('last_booking_info'));
        if (lastInfo) {
            document.getElementById('s-name').innerText = lastInfo.customerKorName;
            const payNames = { card: '신용/체크카드', transfer: '계좌이체', vbank: '가상계좌', kakao: '카카오페이' };
            document.getElementById('s-payment').innerText = payNames[lastInfo.paymentMethod] || lastInfo.paymentMethod;
        }
    });
</script>
</body>
</html>
