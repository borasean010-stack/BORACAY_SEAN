<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 정보 입력 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #fcfcfc; }
        .booking-container { max-width: 800px; margin: 120px auto 100px; padding: 0 20px; }
        .form-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.03); border: 1px solid #eee; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 15px; font-weight: 700; color: #333; margin-bottom: 10px; }
        .input-group input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 12px; font-family: inherit; font-size: 16px; transition: 0.2s; }
        .input-group input:focus { outline: none; border-color: #ff6a00; box-shadow: 0 0 0 3px rgba(255,106,0,0.1); }
        
        .section-divider { height: 1px; background: #eee; margin: 30px 0; }
        .section-subtitle { font-size: 18px; font-weight: 800; color: #ff6a00; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        
        .next-btn { width: 100%; padding: 20px; background: #ff6a00; color: white; border: none; border-radius: 16px; font-size: 18px; font-weight: 800; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        .next-btn:hover { background: #e65f00; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255,106,0,0.2); }

        #pickup-sending-fields { display: none; } 
        .required-mark { color: #ff6a00; margin-left: 4px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="header-left">
        <div class="logo"><a href="index.html">BORACAY_SEAN</a></div>
    </div>
</div>

<div class="booking-container">
    <div class="form-card">
        <h2 style="font-size:28px; font-weight:800; margin-bottom:10px;">예약 정보 입력</h2>
        <p style="color:#888; margin-bottom:30px;">정확한 예약을 위해 정보를 꼼꼼히 입력해 주세요.</p>
        
        <form onsubmit="handleFormSubmit(event)">
            <!-- 👤 기본 정보 -->
            <div class="section-subtitle">👤 대표자 정보</div>
            <div class="input-group">
                <label>대표자 영문 이름<span class="required-mark">*</span></label>
                <input type="text" id="eng-name" placeholder="여권과 동일한 영문 성함 (예: HONG GILDONG)" required>
            </div>
            <div class="input-group">
                <label>카카오톡 ID 또는 연락처<span class="required-mark">*</span></label>
                <input type="text" id="contact" placeholder="상담 및 안내를 위한 연락처" required>
            </div>

            <!-- ✈️ 픽업/샌딩 전용 정보 (장바구니 확인 후 표시) -->
            <div id="pickup-sending-fields">
                <div class="section-divider"></div>
                <div class="section-subtitle">✈️ 픽업 정보 (보라카이 입국)</div>
                <div class="input-group">
                    <label>픽업 항공편명<span class="required-mark">*</span></label>
                    <input type="text" id="pickup-flight" placeholder="예: 7C2301">
                </div>
                <div class="input-group">
                    <label>픽업 호텔 (첫날 호텔)<span class="required-mark">*</span></label>
                    <input type="text" id="pickup-resort" placeholder="보라카이 도착 첫날 리조트명">
                </div>

                <div class="section-divider"></div>
                <div class="section-subtitle">🛫 샌딩 정보 (보라카이 출국)</div>
                <div class="input-group">
                    <label>샌딩 항공편명<span class="required-mark">*</span></label>
                    <input type="text" id="sending-flight" placeholder="예: 7C2302">
                </div>
                <div class="input-group">
                    <label>샌딩 호텔 (마지막날 호텔)<span class="required-mark">*</span></label>
                    <input type="text" id="sending-resort" placeholder="보라카이 마지막날 체크아웃 리조트명">
                </div>
            </div>

            <button type="submit" class="next-btn">결제 및 예약 완료하기</button>
        </form>
    </div>
</div>

<footer class="footer">
    <div class="footer-left">
        <b>상호 : 보라카이션 | 대표 : 윤오현</b><br>
        서울특별시 중랑구 상봉로 16길 25-3<br>
        사업자번호 : 498-31-00593<br>
        daemit@naver.com
    </div>
    <div class="footer-right">
        <a href="https://business.kakao.com/_zBArM/chats" target="_blank" class="kakao-banner">
            <div class="kb-text"><span>무엇이든 물어보세요!</span><b>실시간 카톡 상담하기</b></div>
        </a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const hasPickup = cart.some(item => item.name.includes('픽업샌딩'));
        
        if (hasPickup) {
            const fields = document.getElementById('pickup-sending-fields');
            fields.style.display = 'block';
            
            // 필수 입력 설정
            document.getElementById('pickup-flight').required = true;
            document.getElementById('pickup-resort').required = true;
            document.getElementById('sending-flight').required = true;
            document.getElementById('sending-resort').required = true;
        }
    });

    function handleFormSubmit(e) {
        e.preventDefault();
        
        const bookingData = {
            name: document.getElementById('eng-name').value,
            contact: document.getElementById('contact').value,
            pickupFlight: document.getElementById('pickup-flight').value || 'N/A',
            pickupResort: document.getElementById('pickup-resort').value || 'N/A',
            sendingFlight: document.getElementById('sending-flight').value || 'N/A',
            sendingResort: document.getElementById('sending-resort').value || 'N/A'
        };
        
        localStorage.setItem('last_booking_info', JSON.stringify(bookingData));
        location.href = 'booking-complete.html';
    }
</script>
</body>
</html>
