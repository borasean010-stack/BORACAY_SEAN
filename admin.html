<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <h1>판매자 센터 로그인</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard Layered Layout -->
    <div id="admin-container" class="admin-full-layout" style="display: none;">
        
        <!-- 1. Left Sidebar Navigation -->
        <aside class="ss-sidebar">
            <div class="ss-sidebar-brand">
                <img src="logo.png" alt="Logo" class="ss-logo">
                <span class="ss-brand-name">판매자 센터</span>
            </div>
            <nav class="ss-nav">
                <div class="ss-nav-group">
                    <p class="ss-nav-label">판매 관리</p>
                    <button class="ss-nav-item active" id="menu-new" onclick="switchAdminTab('new')">
                        <span class="material-icons">inbox</span> 신규예약
                    </button>
                    <button class="ss-nav-item" id="menu-confirmed" onclick="switchAdminTab('confirmed')">
                        <span class="material-icons">task_alt</span> 예약확정
                    </button>
                    <button class="ss-nav-item" id="menu-resorts" onclick="switchAdminTab('resorts')">
                        <span class="material-icons">hotel</span> 리조트 견적
                    </button>
                </div>
                <div class="ss-nav-group">
                    <p class="ss-nav-label">문의 관리</p>
                    <a href="http://pf.kakao.com/_zBArM/chat" target="_blank" class="ss-nav-item">
                        <span class="material-icons">chat</span> 카톡 상담
                    </a>
                </div>
            </nav>
            <div class="ss-sidebar-footer">
                <button id="logout-btn"><span class="material-icons">logout</span> 로그아웃</button>
            </div>
        </aside>

        <!-- 2. Main Content -->
        <div class="ss-main">
            <!-- Top Header -->
            <header class="ss-top-header">
                <div class="ss-header-left">
                    <span class="material-icons">menu</span>
                    <span class="ss-breadcrumb">홈 > <b id="breadcrumb-active">신규예약</b></span>
                </div>
                <div class="ss-header-right">
                    <span id="display-admin-id">Admin</span>님 반갑습니다.
                </div>
            </header>

            <div class="ss-content">
                <!-- 3. Reverted Top Layer Status Tabs -->
                <div class="ss-status-layer">
                    <div class="ss-status-card active" id="tab-new" onclick="switchAdminTab('new')">
                        <div class="st-label">신규예약(입금대기)</div>
                        <div class="st-count" id="count-new">0</div>
                    </div>
                    <div class="ss-status-card" id="tab-confirmed" onclick="switchAdminTab('confirmed')">
                        <div class="st-label">예약확정 내역</div>
                        <div class="st-count" id="count-confirmed">0</div>
                    </div>
                    <div class="ss-status-card" id="tab-resorts" onclick="switchAdminTab('resorts')">
                        <div class="st-label">리조트 견적 건수</div>
                        <div class="st-count" id="count-resorts">0</div>
                    </div>
                </div>

                <!-- 4. Data Table Section -->
                <div class="ss-view-header">
                    <h2 id="current-view-title">신규예약 관리</h2>
                    <div class="ss-tools">
                        <input type="text" id="header-global-search" placeholder="고객명/예약번호 검색" class="ss-search">
                    </div>
                </div>

                <div class="ss-card">
                    <div class="ss-table-wrapper">
                        <table class="ss-table">
                            <thead>
                                <tr>
                                    <th width="40"><input type="checkbox" id="check-all"></th>
                                    <th width="50">번호</th>
                                    <th width="100">예약번호</th>
                                    <th width="100">고객명</th>
                                    <th>상품 정보</th>
                                    <th width="120">금액</th>
                                    <th width="100">신청일</th>
                                    <th width="90">상태</th>
                                    <th width="160">액션</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                <!-- JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header"><h3>예약 상세 정보</h3><button onclick="closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer"><button class="btn-action-outline" onclick="closeModal()">닫기</button></div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
