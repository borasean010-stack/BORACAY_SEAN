<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판매자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <div class="login-logo">
                <img src="logo.png" alt="Logo">
                <h1>판매자 센터</h1>
            </div>
            <form id="login-form">
                <input type="text" id="username" placeholder="관리자 아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Layout -->
    <div id="admin-container" class="admin-layout-v3" style="display: none;">
        
        <!-- Header -->
        <header class="admin-top-nav">
            <div class="header-left">
                <img src="logo.png" alt="Logo" class="admin-top-logo">
                <span class="brand-text">판매자 센터</span>
            </div>
            <div class="header-right">
                <div class="admin-user-info">
                    <span class="material-icons">account_circle</span>
                    <span id="display-admin-id">Admin</span>
                    <button id="logout-btn" class="btn-logout">로그아웃</button>
                </div>
            </div>
        </header>

        <div class="admin-content-wrapper">
            <!-- 📱 Left Sidebar Banner (Menu) -->
            <aside class="admin-side-nav">
                <div class="nav-section">
                    <p class="section-label">판매 관리</p>
                    <button class="nav-item active" id="menu-new" onclick="switchAdminTab('new')">
                        <span class="material-icons">fiber_new</span> 신규예약
                    </button>
                    <button class="nav-item" id="menu-confirmed" onclick="switchAdminTab('confirmed')">
                        <span class="material-icons">check_circle</span> 예약확정
                    </button>
                    <button class="nav-item" id="menu-resorts" onclick="switchAdminTab('resorts')">
                        <span class="material-icons">hotel</span> 리조트 견적
                    </button>
                </div>
                
                <div class="nav-section footer-links">
                    <p class="section-label">시스템</p>
                    <a href="index.html" class="nav-item"><span class="material-icons">home</span> 홈페이지 바로가기</a>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="admin-main-content">
                <div class="view-header">
                    <h2 id="current-view-title">신규예약 관리</h2>
                    <div class="header-tools">
                        <input type="text" id="header-global-search" placeholder="고객명 또는 예약번호 검색" class="search-input">
                    </div>
                </div>

                <!-- Summary Status (Top Layer style maintained but simplified) -->
                <div class="admin-main-tabs" style="display: none;">
                    <!-- Maintain compatibility with existing switch logic if needed -->
                    <div id="tab-new"></div><div id="tab-confirmed"></div><div id="tab-resorts"></div>
                </div>

                <div class="content-card">
                    <div class="table-container">
                        <table class="admin-data-table">
                            <thead>
                                <tr>
                                    <th width="40"><input type="checkbox" id="check-all"></th>
                                    <th width="50">번호</th>
                                    <th width="100">예약번호</th>
                                    <th width="100">고객명</th>
                                    <th>상품 정보</th>
                                    <th width="110">결제금액</th>
                                    <th width="100">신청일</th>
                                    <th width="90" style="text-align:center;">상태</th>
                                    <th width="160">관리</th>
                                </tr>
                            </thead>
                            <tbody id="admin-table-body">
                                <!-- JS Dynamic Render -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>예약 상세 내역</h3>
                <button onclick="closeModal()" class="close-btn">✕</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn-action-outline" onclick="closeModal()">확인</button>
            </div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
