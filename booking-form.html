<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 정보 입력 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8f9fa; color: #333; }
        .booking-container { max-width: 800px; margin: 100px auto 100px; padding: 0 20px; }
        .order-summary-card { background: #fff; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #eee; margin-bottom: 30px; }
        .order-summary-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 20px; color: #ff6a00; display: flex; align-items: center; gap: 8px; }
        .order-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px dashed #eee; font-size: 15px; }
        .order-item:last-child { border-bottom: none; }
        .order-item b { color: #ff6a00; }
        
        .form-card { background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .form-card h2 { font-size: 28px; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        .form-card p.desc { color: #888; margin-bottom: 35px; font-size: 15px; }
        
        .step-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step { flex: 1; height: 6px; background: #eee; border-radius: 10px; position: relative; }
        .step.active { background: #ff6a00; }
        .step span { position: absolute; top: 12px; left: 0; font-size: 12px; font-weight: 800; color: #bbb; }
        .step.active span { color: #ff6a00; }

        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-size: 15px; font-weight: 700; color: #444; margin-bottom: 10px; }
        .input-group input, .input-group select { width: 100%; padding: 16px; border: 1.5px solid #eee; border-radius: 14px; font-family: inherit; font-size: 16px; transition: 0.3s; background: #fafafa; }
        .input-group input:focus, .input-group select:focus { outline: none; border-color: #ff6a00; background: white; box-shadow: 0 0 0 4px rgba(255,106,0,0.1); }
        
        .section-subtitle { font-size: 19px; font-weight: 800; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .next-btn { width: 100%; padding: 22px; background: #ff6a00; color: white; border: none; border-radius: 18px; font-size: 19px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 20px; box-shadow: 0 10px 25px rgba(255,106,0,0.25); }
        .next-btn:hover { background: #e65f00; transform: translateY(-3px); }
        
        #pickup-sending-fields { display: none; background: #fffcf9; padding: 25px; border-radius: 20px; border: 1px solid #fff1e6; margin-top: 10px; margin-bottom: 30px; }
        .required-mark { color: #ff6a00; margin-left: 4px; }

        #payment-section { display: none; }
        .payment-methods { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .method-card { border: 2px solid #eee; padding: 20px; border-radius: 18px; cursor: pointer; text-align: center; transition: 0.3s; }
        .method-card:hover { border-color: #ff6a00; background: #fffaf5; }
        .method-card.selected { border-color: #ff6a00; background: #fffaf5; box-shadow: 0 5px 15px rgba(255,106,0,0.1); }
        .method-card b { display: block; font-size: 15px; }

        @media (max-width: 600px) { .form-card { padding: 30px 20px; } .booking-container { margin-top: 80px; } }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="header-left">
        <div class="logo"><a href="index.html"><img src="logo.png" class="logo-img">BORACAY_SEAN</a></div>
    </div>
</div>

<div class="booking-container">
    <div class="step-indicator">
        <div class="step active" id="step1-bar"><span>01 예약정보</span></div>
        <div class="step" id="step2-bar"><span>02 결제수단</span></div>
    </div>

    <div class="order-summary-card">
        <h3>🛒 선택하신 상품 확인</h3>
        <div id="summary-list"></div>
    </div>

    <div class="form-card">
        <!-- 1단계: 정보 입력 -->
        <div id="info-section">
            <h2>예약 정보 입력</h2>
            <p class="desc">정확한 정보를 입력해 주셔야 차질 없는 진행이 가능합니다.</p>
            
            <form id="info-form">
                <div class="section-subtitle">👤 대표자 기본 정보</div>
                <div class="input-group">
                    <label>대표자 성함 (한글)<span class="required-mark">*</span></label>
                    <input type="text" id="kor-name" placeholder="예: 홍길동" required>
                </div>
                <div class="input-group">
                    <label>카카오톡 ID 또는 연락처<span class="required-mark">*</span></label>
                    <input type="text" id="contact" placeholder="안내 메시지를 받으실 수 있는 정보" required>
                </div>

                <div id="pickup-sending-fields">
                    <div class="section-subtitle" style="color:#ff6a00;">✈️ 픽업/샌딩 상세 정보</div>
                    <div class="input-group"><label>대표자 영문 이름</label><input type="text" id="eng-name" placeholder="예: HONG GILDONG"></div>
                    <div class="input-group"><label>픽업 항공편명</label><input type="text" id="pickup-flight" placeholder="예: TW125"></div>
                    <div class="input-group"><label>픽업 호텔</label><input type="text" id="pickup-resort" placeholder="리조트명"></div>
                    <div class="input-group"><label>샌딩 항공편명</label><input type="text" id="sending-flight" placeholder="예: TW126"></div>
                    <div class="input-group"><label>샌딩 호텔</label><input type="text" id="sending-resort" placeholder="리조트명"></div>
                </div>

                <button type="submit" class="next-btn">다음 단계로 (결제수단 선택)</button>
            </form>
        </div>

        <!-- 2단계: 결제 수단 선택 -->
        <div id="payment-section">
            <h2>결제 수단 선택</h2>
            <p class="desc">원하시는 결제 수단을 선택해 주세요.</p>
            
            <div class="payment-methods">
                <div class="method-card" onclick="selectMethod(this, 'card')"><b>신용/체크카드</b></div>
                <div class="method-card" onclick="selectMethod(this, 'transfer')"><b>실시간 계좌이체</b></div>
                <div class="method-card" onclick="selectMethod(this, 'vbank')"><b>가상계좌</b></div>
                <div class="method-card" onclick="selectMethod(this, 'kakao')"><b>카카오페이</b></div>
            </div>

            <button type="button" class="next-btn" id="pay-btn" onclick="submitFinal()">결제 및 예약 완료</button>
            <button type="button" onclick="goBack()" style="width:100%; margin-top:15px; background:none; border:none; color:#999; font-weight:700; cursor:pointer;">이전 단계로</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // FIXME: 실제 운영을 위해 아래 설정값을 Firebase 콘솔에서 복사해서 붙여넣으세요.
    const firebaseConfig = {
        apiKey: "AIzaSyDkDjmGKQDF-0Vu2S_qtI6W5Hf2-j4tKcM",
        authDomain: "boracaysean-69b4a.firebaseapp.com",
        projectId: "boracaysean-69b4a",
        storageBucket: "boracaysean-69b4a.firebasestorage.app",
        messagingSenderId: "806585874771",
        appId: "1:806585874771:web:64a094d241730ca38109a6"
    };

    let db = null;
    try {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
    } catch (e) { console.error("Firebase init failed"); }

    let hasPickup = false;
    let cartData = [];
    let selectedPayment = '';

    document.addEventListener('DOMContentLoaded', function() {
        const directBuy = sessionStorage.getItem('directBuyItem');
        cartData = directBuy ? [JSON.parse(directBuy)] : JSON.parse(localStorage.getItem('cart') || '[]');
        if (cartData.length === 0) { alert('상품이 없습니다.'); return; }

        const list = document.getElementById('summary-list');
        cartData.forEach(item => {
            if (item.name.includes('픽업샌딩')) hasPickup = true;
            list.innerHTML += `<div class="order-item"><span>${item.name} (${item.count}명)</span><b>₩ ${(item.price * item.count).toLocaleString()}</b></div>`;
        });
        if (hasPickup) document.getElementById('pickup-sending-fields').style.display = 'block';

        // 리조트 견적인 경우 UI 변경
        const isResortQuote = cartData.some(item => item.name.includes('리조트 견적'));
        if (isResortQuote) {
            document.querySelector('#info-section h2').innerText = '견적 신청 정보 입력';
            document.querySelector('#info-section .next-btn').innerText = '견적 신청하기';
            document.getElementById('step2-bar').style.display = 'none';
            document.getElementById('step1-bar').querySelector('span').innerText = '견적 신청';
        }
    });

    document.getElementById('info-form').onsubmit = function(e) {
        e.preventDefault();
        
        // 리조트 견적인 경우 결제 수단 선택 없이 바로 완료 처리 시도
        const isResortQuote = cartData.some(item => item.name.includes('리조트 견적'));
        
        if (isResortQuote) {
            selectedPayment = '견적요청';
            submitFinal();
        } else {
            document.getElementById('info-section').style.display = 'none';
            document.getElementById('payment-section').style.display = 'block';
            document.getElementById('step2-bar').classList.add('active');
            window.scrollTo(0, 0);
        }
    };

    window.selectMethod = function(el, method) {
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedPayment = method;
    };

    window.goBack = function() {
        document.getElementById('info-section').style.display = 'block';
        document.getElementById('payment-section').style.display = 'none';
        document.getElementById('step2-bar').classList.remove('active');
    };

    window.submitFinal = async function() {
        if (!selectedPayment) { alert('결제 수단을 선택해 주세요.'); return; }
        
        const btn = document.getElementById('pay-btn');
        const originalText = btn.innerText;
        btn.innerText = '예약 처리 중...';
        btn.disabled = true;

        const pickupItem = cartData.find(i => i.name.includes('픽업샌딩'));
        
        const bookingData = {
            customerKorName: document.getElementById('kor-name').value,
            contact: document.getElementById('contact').value,
            paymentMethod: selectedPayment,
            items: cartData,
            totalPrice: cartData.reduce((acc, curr) => acc + (curr.price * curr.count), 0),
            status: '신규',
            createdAt: serverTimestamp ? serverTimestamp() : new Date(),
            engName: document.getElementById('eng-name').value || '',
            pickupDate: pickupItem ? pickupItem.pickupDate : '',
            sendingDate: pickupItem ? pickupItem.sendingDate : '',
            pickupFlight: document.getElementById('pickup-flight').value || '',
            pickupResort: document.getElementById('pickup-resort').value || '',
            sendingFlight: document.getElementById('sending-flight').value || '',
            sendingResort: document.getElementById('sending-resort').value || ''
        };

        const finalize = () => {
            localStorage.setItem('last_booking_info', JSON.stringify(bookingData));
            localStorage.removeItem('cart');
            sessionStorage.removeItem('directBuyItem');
            location.href = 'booking-complete.html';
        };

        try {
            if (!db) { finalize(); return; }
            
            // 데이터 저장 시도 (3초 타임아웃)
            await Promise.race([
                addDoc(collection(db, "reservations"), bookingData),
                new Promise((_, reject) => setTimeout(() => reject(new Error('Timeout')), 3000))
            ]);
            
            finalize();
        } catch (e) {
            console.warn("DB 저장 지연 또는 오류:", e);
            finalize();
        }
    };
</script>
</body>
</html>
