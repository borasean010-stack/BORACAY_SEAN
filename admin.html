<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 센터 - Boracay Sean</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="smartstore-admin">
    <!-- Admin Login -->
    <div id="login-container" class="admin-login-wrapper">
        <div class="admin-login-card">
            <h1>판매자 센터 로그인</h1>
            <form id="login-form">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <button type="submit" class="btn-admin-login">로그인</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="admin-container" class="admin-layout-v3" style="display: none;">
        <header class="admin-top-nav">
            <div class="header-left">
                <img src="logo.png" alt="Logo" class="admin-top-logo">
                <span class="brand-text">판매자 센터</span>
            </div>
            <div class="header-right">
                <span id="display-admin-id" style="font-weight:700; font-size:13px;">Admin</span>
                <button id="logout-btn" style="margin-left:15px; border:1px solid #ddd; background:#fff; padding:4px 10px; border-radius:4px; font-size:11px; cursor:pointer;">로그아웃</button>
            </div>
        </header>

        <div class="admin-content-wrapper">
            <aside class="admin-side-nav">
                <nav class="side-menu-container">
                    <div class="nav-section">
                        <p class="section-label">주문/배송 관리</p>
                        <button class="nav-item active" data-view="all">
                            <span class="material-icons">list_alt</span> 전체 예약 목록
                        </button>
                        <button class="nav-item" data-view="tours">
                            <span class="material-icons">explore</span> 투어/액티비티 예약
                        </button>
                        <button class="nav-item" data-view="resorts">
                            <span class="material-icons">hotel</span> 리조트 견적
                        </button>
                    </div>
                    <div class="nav-section">
                        <p class="section-label">기타 관리</p>
                        <button class="nav-item" data-view="cancelled">
                            <span class="material-icons">cancel</span> 취소 내역
                        </button>
                    </div>
                </nav>
            </aside>

            <main class="admin-main-content">
                <div class="view-header">
                    <h2 id="current-view-title">전체 예약 목록</h2>
                    <div class="search-bar">
                        <input type="text" id="header-global-search" placeholder="고객명 또는 예약번호 검색" style="padding:6px 12px; border:1px solid #ddd; border-radius:4px; font-size:12px; width:250px;">
                    </div>
                </div>

                <div class="content-card">
                    <table class="admin-data-table">
                        <thead>
                            <tr>
                                <th width="40"><input type="checkbox" id="check-all"></th>
                                <th width="50">번호</th>
                                <th width="100">예약번호</th>
                                <th width="100">고객명</th>
                                <th>상품 정보</th>
                                <th width="120">신청금액</th>
                                <th width="100">신청일</th>
                                <th width="90" style="text-align:center;">상태</th>
                                <th width="180">관리 액션</th>
                            </tr>
                        </thead>
                        <tbody id="admin-table-body">
                            <!-- JS Dynamic Render -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal -->
    <div id="res-detail-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <div class="modal-header"><h3>예약 상세 내역</h3><button onclick="closeModal()">✕</button></div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer"><button class="btn-action-outline" onclick="closeModal()">확인</button></div>
        </div>
    </div>

    <script type="module" src="admin.js"></script>
</body>
</html>
