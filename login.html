<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 | BORACAY_SEAN</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.0/kakao.min.js" integrity="sha384-l68G9m6HS8uR7C/5L94K8N08O0t8TzU+A0fS2x5W5F9z7Vz0O+6x1H6Z8M2N5R1" crossorigin="anonymous"></script>
    <style>
        :root {
            --lux-gold: #c5a059;
            --lux-dark: #1a1a1a;
            --lux-light: #fdfdfd;
        }

        body.lux-login-bg {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
        }

        /* Ambient Background Effect */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('beach1.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(40px) brightness(0.4);
            z-index: -1;
            transform: scale(1.1);
        }

        .login-card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 60px 50px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-logo-centered {
            margin-bottom: 40px;
        }

        .login-logo-centered img {
            width: 120px;
            height: auto;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
        }

        .login-logo-centered h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 900;
            margin-top: 15px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-welcome {
            margin-bottom: 50px;
        }

        .login-welcome h2 {
            color: var(--lux-gold);
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .login-welcome p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            line-height: 1.6;
        }

        .kakao-login-btn {
            width: 100%;
            border: none;
            background: #fee500;
            color: #3c1e1e;
            padding: 20px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 800;
            font-size: 17px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(254, 229, 0, 0.2);
        }

        .kakao-login-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(254, 229, 0, 0.4);
        }

        .kakao-login-btn img {
            width: 24px;
        }

        .home-link {
            display: inline-block;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .home-link:hover {
            color: #fff;
        }

        /* Footer in Login */
        .login-footer {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 12px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body class="lux-login-bg">
    <div class="ambient-bg"></div>

    <div class="login-card">
        <div class="login-logo-centered">
            <a href="index.html">
                <img src="logo.png" alt="Boracay Sean Logo">
                <h1>BORACAY_SEAN</h1>
            </a>
        </div>

        <div class="login-welcome">
            <h2>Luxury Experience</h2>
            <p>보라카이션 멤버십으로 드리는 특별한 혜택,<br>카카오 계정으로 1초만에 시작하세요.</p>
        </div>

        <button onclick="loginWithKakao()" class="kakao-login-btn">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e3/KakaoTalk_logo.svg" alt="Kakao">
            카카오 1초 로그인
        </button>

        <a href="index.html" class="home-link">홈으로 돌아가기</a>
    </div>

    <div class="login-footer">
        © 2024 BORACAY SEAN. All Rights Reserved.
    </div>

    <script>
        const KAKAO_KEY = '9e8b2d2be22f60f1cc512d61d6ba6991';
        const REDIRECT_URI = 'https://boracay-sean.pages.dev/login.html';

        if (!Kakao.isInitialized()) Kakao.init(KAKAO_KEY);

        function loginWithKakao() {
            Kakao.Auth.authorize({
                redirectUri: REDIRECT_URI
            });
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');

            if (code) {
                console.log("인가 코드 확인됨:", code);
                const tempUser = { 
                    nickname: "보라카이션 손님", 
                    id: "kakao_" + Math.floor(Math.random() * 1000000) 
                };
                localStorage.setItem('kakao_user', JSON.stringify(tempUser));
                
                const directBuy = sessionStorage.getItem('directBuyItem');
                setTimeout(() => {
                    location.href = directBuy ? 'booking-form.html' : 'index.html';
                }, 500);
            }
        };
    </script>
</body>
</html>
